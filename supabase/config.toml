# Supabase local dev config. Generated for the Dreamer monorepo.
# Override anything per-developer via env. Production targets a hosted
# Supabase Cloud project; this file only governs `bunx supabase start`.

project_id = "dreamer"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 15

[db.pooler]
enabled = false
port = 54329

[realtime]
enabled = true

[studio]
enabled = true
port = 54323

[inbucket]
enabled = true
port = 54324

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://localhost:3002"
additional_redirect_urls = [
  "http://localhost:3002/auth/callback",
  "http://localhost:3004/auth/callback",
  "http://127.0.0.1:3002/auth/callback",
]
jwt_expiry = 3600
enable_refresh_token_rotation = true
refresh_token_reuse_interval = 10
enable_signup = true
enable_anonymous_sign_ins = false
enable_manual_linking = false

[auth.email]
enable_signup = false
double_confirm_changes = true
enable_confirmations = false

# GitHub OAuth provider — secret read from env at startup
# (`SUPABASE_AUTH_EXTERNAL_GITHUB_SECRET`).
[auth.external.github]
enabled = true
client_id = "env(SUPABASE_AUTH_EXTERNAL_GITHUB_CLIENT_ID)"
secret = "env(SUPABASE_AUTH_EXTERNAL_GITHUB_SECRET)"
redirect_uri = "http://127.0.0.1:54321/auth/v1/callback"

[edge_runtime]
enabled = false
