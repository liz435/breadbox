name: e2e

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    name: Playwright smoke tests
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Cache Playwright browser binaries to avoid the ~90 MiB chromium
      # download on every CI run. Key on the playwright package version so
      # cache invalidates correctly on upgrades.
      - name: Get Playwright version
        id: pw-version
        run: |
          VERSION=$(bun pm ls --cwd packages/app 2>/dev/null | grep "@playwright/test" | head -1 | sed 's/.*@//' || echo "unknown")
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}

      - name: Install Playwright Chromium
        run: bunx --cwd packages/app playwright install --with-deps chromium

      # webServer in playwright.config.ts boots `bun run dev` (which spawns
      # both API and Vite). It waits for http://localhost:3002 before
      # running tests. No need to start servers manually here.
      - name: Run Playwright tests
        env:
          # CI gates make config.retries = 1 and emit the HTML report
          CI: "true"
          # Skip Anthropic-backed agent flows since this is just UI smoke
          ANTHROPIC_API_KEY: "sk-ant-test-key-not-real"
        run: bun run --cwd packages/app test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: packages/app/playwright-report/
          retention-days: 7

      - name: Upload Playwright traces
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: packages/app/test-results/
          retention-days: 7
