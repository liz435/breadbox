<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Current Arduino Agent Structure</title>
  <style>
    :root {
      --bg: #f7f7f5;
      --card: #ffffff;
      --text: #1f2937;
      --muted: #6b7280;
      --existing: #e8ecff;
      --existing-border: #7182f2;
      --new: #e6f7ee;
      --new-border: #35a56f;
      --modified: #fff4df;
      --modified-border: #d28b1c;
    }
    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #161a1d;
        --card: #1f2429;
        --text: #e5e7eb;
        --muted: #9ca3af;
        --existing: #313a70;
        --existing-border: #8f9cff;
        --new: #1f4e39;
        --new-border: #58c28e;
        --modified: #5b4724;
        --modified-border: #f0b24c;
      }
    }
    body {
      margin: 0;
      padding: 24px;
      background: var(--bg);
      color: var(--text);
      font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
    }
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      background: var(--card);
      border-radius: 14px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.12);
      padding: 20px;
    }
    h1 {
      margin: 0 0 6px;
      font-size: 22px;
    }
    p {
      margin: 0 0 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .legend {
      display: flex;
      gap: 16px;
      flex-wrap: wrap;
      margin: 6px 0 14px;
      font-size: 13px;
      color: var(--muted);
    }
    .legend-item { display: inline-flex; align-items: center; gap: 8px; }
    .swatch {
      width: 14px;
      height: 14px;
      border-radius: 3px;
      border: 1px solid rgba(0,0,0,0.15);
    }
    #diagram { overflow-x: auto; }
    #diagram svg { min-width: 1200px; max-width: 100%; }
    code { background: rgba(127,127,127,0.16); padding: 1px 5px; border-radius: 4px; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>Current Agent Structure: Arduino Breadboard + Code Generation</h1>
    <p>Single-run pipeline with domain-aware planning, electrical validation, code-circuit consistency checks, and compile gate.</p>

    <div class="legend">
      <span class="legend-item"><span class="swatch" id="sw-existing"></span>Existing</span>
      <span class="legend-item"><span class="swatch" id="sw-new"></span>New</span>
      <span class="legend-item"><span class="swatch" id="sw-modified"></span>Modified</span>
    </div>

    <div id="diagram"></div>
  </div>

  <script type="module">
    import mermaid from 'https://esm.sh/mermaid@11/dist/mermaid.esm.min.mjs';

    const dark = matchMedia('(prefers-color-scheme: dark)').matches;

    document.getElementById('sw-existing').style.background = getComputedStyle(document.documentElement).getPropertyValue('--existing');
    document.getElementById('sw-new').style.background = getComputedStyle(document.documentElement).getPropertyValue('--new');
    document.getElementById('sw-modified').style.background = getComputedStyle(document.documentElement).getPropertyValue('--modified');

    mermaid.initialize({
      startOnLoad: false,
      theme: 'base',
      flowchart: { curve: 'basis', nodeSpacing: 38, rankSpacing: 48, padding: 14 },
      themeVariables: {
        darkMode: dark,
        primaryColor: getComputedStyle(document.documentElement).getPropertyValue('--existing').trim(),
        primaryBorderColor: getComputedStyle(document.documentElement).getPropertyValue('--existing-border').trim(),
        secondaryColor: getComputedStyle(document.documentElement).getPropertyValue('--new').trim(),
        secondaryBorderColor: getComputedStyle(document.documentElement).getPropertyValue('--new-border').trim(),
        tertiaryColor: getComputedStyle(document.documentElement).getPropertyValue('--modified').trim(),
        tertiaryBorderColor: getComputedStyle(document.documentElement).getPropertyValue('--modified-border').trim(),
        lineColor: dark ? '#a5adb8' : '#5f6470',
        textColor: dark ? '#e5e7eb' : '#1f2937',
        fontSize: '12px',
      }
    });

    const chart = `flowchart TD
      U["User prompt"]:::existing --> API["/api/chat"]:::existing
      API --> LOCK["Acquire conversation lock + trace"]:::new
      LOCK --> LOAD["Load project, scene, board tracker, thread"]:::existing
      LOAD --> RUN["Create run(status=running)"]:::existing
      RUN --> INTENT{"Intent + confidence"}:::modified

      INTENT -- "template high-conf" --> TEMPLATE["Template path + board ops"]:::existing
      TEMPLATE --> APPLYTMP["Apply template ops + complete run"]:::existing
      APPLYTMP --> RELEASE

      INTENT -- "agent / low-conf" --> MEM["Tiered memory retrieval (recent + vector + summary cache)"]:::new
      MEM --> ROUTER["Router picks model + domain + tool mode"]:::modified
      ROUTER --> BOARDSEL["Board capability resolver (UNO/Nano/ESP32, voltage, pin caps)"]:::new
      BOARDSEL --> MSG["Build context-sized model messages"]:::modified
      MSG --> PLAN["Generate explicit plan (ops + code + validation tasks)"]:::new
      PLAN --> APPROVE{"Destructive or high risk?"}:::new
      APPROVE -- "yes" --> PREVIEW["Stream plan preview + require confirmation"]:::new
      PREVIEW --> LOOP
      APPROVE -- "no" --> LOOP

      LOOP["Core tool loop (budgeted steps)"]:::existing --> TOOLS{"tool mode"}:::existing
      TOOLS -- "circuit/build/edit" --> CIRTOOLS["Circuit tools + delegation"]:::existing
      TOOLS -- "code" --> CODETOOLS["Code tools + delegation"]:::existing
      CIRTOOLS --> DELEG{"Delegate specialist?"}:::existing
      CODETOOLS --> DELEG
      DELEG -- "graph/circuit specialist" --> SPEC["Specialist run with timeout/retry/fallback"]:::new
      DELEG -- "none" --> EXEC["Execute core tool"]:::existing
      SPEC --> EXEC

      EXEC --> PROPOSE{"Generated/updated circuit?"}:::modified
      PROPOSE -- "yes" --> ERULES["Electrical rules engine: shorts, rail misuse, current, floating nets, part limits"]:::new
      PROPOSE -- "no" --> COLLECT
      ERULES --> EOK{"Circuit valid?"}:::new
      EOK -- "no" --> FIXPLAN["Auto-fix plan or ask user for constraints"]:::new
      FIXPLAN --> LOOP
      EOK -- "yes" --> CONTRACT["Netlist↔Code contract check (pin map, pull-up/down, PWM/ADC use)"]:::new
      CONTRACT --> COK{"Consistent?"}:::new
      COK -- "no" --> LOOP
      COK -- "yes" --> COMPILE["Compile gate (arduino-cli) + lib/dependency check"]:::new

      COMPILE --> K{"Compile success?"}:::new
      K -- "no" --> CERR["Capture compiler diagnostics, patch code, retry within budget"]:::new
      CERR --> LOOP
      K -- "yes" --> COLLECT["collectResult()"]:::existing

      COLLECT --> REFLECT{"Reflection: output meets intent?"}:::new
      REFLECT -- "no + budget" --> REPLAN["Adjust plan and continue"]:::new
      REPLAN --> LOOP
      REFLECT -- "yes / budget exhausted" --> POLICY["Policy engine (externalized)"]:::new
      POLICY --> SAFE{"Violation?"}:::modified
      SAFE -- "yes" --> BLOCK["Blocked response + no ops"]:::existing
      SAFE -- "no" --> RESULT["Assistant text + board ops + graph ops + token usage"]:::existing

      BLOCK --> APPLY
      RESULT --> APPLY["Atomic apply (expected version)\nAbort all on conflict"]:::modified
      APPLY --> SUMMARY["Background summary refresh + overhead"]:::existing
      SUMMARY --> EMIT["Emit stream result + trace + diagnostics"]:::modified
      EMIT --> RELEASE["Release lock + close trace"]:::new
      RELEASE --> DONE["Done"]:::existing

      classDef existing fill:#e8ecff,stroke:#7182f2,color:#1f2e7a;
      classDef new fill:#e6f7ee,stroke:#35a56f,color:#0f5f3c;
      classDef modified fill:#fff4df,stroke:#d28b1c,color:#7a4d11;
    `;

    try {
      const { svg } = await mermaid.render('current-agent-structure', chart);
      document.getElementById('diagram').innerHTML = svg;
    } catch (e) {
      document.getElementById('diagram').innerHTML = `<p style="color:#b00020">Failed to render Mermaid: ${e.message}</p>`;
    }
  </script>
</body>
</html>
