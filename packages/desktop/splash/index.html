<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Breadbox</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: radial-gradient(120% 120% at 50% 0%, #2a1a05 0%, #0b0805 60%);
        color: #e5e7eb;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        -webkit-user-select: none;
        user-select: none;
      }
      .mark {
        width: 72px;
        height: 72px;
        filter: drop-shadow(0 6px 20px rgba(217, 138, 30, 0.5));
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      .title {
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .sub {
        font-size: 0.8rem;
        color: #9ca3af;
      }
      .spinner {
        width: 22px;
        height: 22px;
        border-radius: 9999px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-top-color: #e0a13a;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .mark,
        .spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <img class="mark" src="mark.png" alt="Breadbox" width="72" height="72" />
    <div class="title">Breadbox</div>
    <div class="spinner" role="status" aria-label="Starting"></div>
    <div class="sub">Starting the workspace…</div>
  </body>
</html>
