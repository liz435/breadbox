<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Breadbox</title>
    <style>
      :root {
        color-scheme: dark;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        margin: 0;
        height: 100%;
      }
      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.25rem;
        background: radial-gradient(120% 120% at 50% 0%, #1b1530 0%, #0b0b0f 60%);
        color: #e5e7eb;
        font-family:
          system-ui,
          -apple-system,
          "Segoe UI",
          Roboto,
          sans-serif;
        -webkit-user-select: none;
        user-select: none;
      }
      .mark {
        width: 72px;
        height: 72px;
        filter: drop-shadow(0 6px 20px rgba(124, 58, 237, 0.45));
        animation: float 3s ease-in-out infinite;
      }
      @keyframes float {
        0%,
        100% {
          transform: translateY(0);
        }
        50% {
          transform: translateY(-6px);
        }
      }
      .title {
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      .sub {
        font-size: 0.8rem;
        color: #9ca3af;
      }
      .spinner {
        width: 22px;
        height: 22px;
        border-radius: 9999px;
        border: 2px solid rgba(255, 255, 255, 0.15);
        border-top-color: #a78bfa;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      @media (prefers-reduced-motion: reduce) {
        .mark,
        .spinner {
          animation: none;
        }
      }
    </style>
  </head>
  <body>
    <svg class="mark" viewBox="0 0 1024 1024" aria-hidden="true" xmlns="http://www.w3.org/2000/svg">
      <defs>
        <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
          <stop offset="0" stop-color="#6366f1" />
          <stop offset="1" stop-color="#7c3aed" />
        </linearGradient>
      </defs>
      <rect x="64" y="64" width="896" height="896" rx="216" fill="url(#bg)" />
      <path
        d="M512 232 C 540 392, 632 484, 792 512 C 632 540, 540 632, 512 792 C 484 632, 392 540, 232 512 C 392 484, 484 392, 512 232 Z"
        fill="#ffffff"
      />
    </svg>
    <div class="title">Breadbox</div>
    <div class="spinner" role="status" aria-label="Starting"></div>
    <div class="sub">Starting the workspace…</div>
  </body>
</html>
