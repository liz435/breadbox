<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="0" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#e9e3ff"/>
    </linearGradient>
  </defs>

  <!-- rounded-square app tile -->
  <rect x="64" y="64" width="896" height="896" rx="216" fill="url(#bg)"/>

  <!-- big four-point sparkle (echoes the AI "Sparkles" mode glyph) -->
  <path d="M512 232
           C 540 392, 632 484, 792 512
           C 632 540, 540 632, 512 792
           C 484 632, 392 540, 232 512
           C 392 484, 484 392, 512 232 Z"
        fill="url(#spark)"/>

  <!-- small companion sparkle, upper-right -->
  <path d="M760 300
           C 770 352, 808 390, 860 400
           C 808 410, 770 448, 760 500
           C 750 448, 712 410, 660 400
           C 712 390, 750 352, 760 300 Z"
        fill="#ffffff" opacity="0.92"/>
</svg>
